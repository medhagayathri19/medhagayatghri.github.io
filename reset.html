<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="flex-center">
    <div class="glass-container text-center">
        <h2 class="mb-4">Reset Password</h2>
        <p class="label mb-4">Enter your registration number to receive an OTP</p>

        <input id="reg" placeholder="Registration Number">
        <button class="btn mb-4" onclick="sendOtp()">Send OTP</button>

        <input id="otp" placeholder="Enter OTP">
        <input id="newpass" type="password" placeholder="New Password">
        
        <button class="btn mb-4" onclick="resetPassword()">Reset Password</button>

        <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
    </div>
</div>

<script>

function sendOtp(){

const reg=document.getElementById("reg").value;

if(!reg){
alert("Enter Registration Number");
return;
}

fetch("http://localhost:5000/api/send-otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
reg_no:reg
})

})

.then(res=>res.json())

.then(data=>{

if(data.success){
alert("OTP sent! Check server console.");
}
else{
alert("User not found");
}

})

.catch(err=>console.log(err));

}

function resetPassword(){

const reg=document.getElementById("reg").value;
const otp=document.getElementById("otp").value;
const pass=document.getElementById("newpass").value;

fetch("http://localhost:5000/api/reset-password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
reg_no:reg,
otp:otp,
newPassword:pass
})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

alert("Password updated successfully");

window.location.href="index.html";

}
else{

alert(data.message);

}

})

.catch(err=>console.log(err));

}

</script>

</body>

</html>
